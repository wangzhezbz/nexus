# 山海平台 · 中央 SSO + 各产品 的 nginx location 参考（shanhaiyouling.com 主域）
# ⚠️ 这是【并入现有 443 server 的 location 参考】，不是替换整站配置。
#    主域 / 是现有游戏官网；/server-health、/install*、/tool-api-test、/license-* 等
#    都是现有服务，全部保留、由运维主配置维护，本文件一律不碰、绝不放 location /。
#    www.shanhaiyouling.com 是单独 server block，不要混改。改完先 nginx -t 再 reload。
# 流式接口（聊天 SSE）已关缓冲、用 HTTP/1.1。各 upstream 换成实际端口。

# 关键：relay_api 与 auth_up 必须共享同一个 JWT_SECRET，
# 这样中央 SSO 登录后的 cookie 能被 api-relay 后端验签 → 一个账号走遍全平台。
# new-api 网关不对外暴露：仅 api-relay 后端用服务令牌内部访问（Option B 自有计费账本）。
# 门户暂不上主域（主域 / 是现有游戏官网，不能被盖）。如需门户，挂 /portal/ 或子域。
# upstream portal_up   { server 127.0.0.1:3000; }   # 门户首页（主域停用）
upstream auth_up     { server 127.0.0.1:5100; }   # 中央认证 auth-service
upstream chat_up     { server 127.0.0.1:3101; }
upstream chat_api    { server 127.0.0.1:5000; }   # AI 聊天 Flask 后端
upstream tools_up    { server 127.0.0.1:3102; }
# /workflow 本次暂不上线：生产服务化、Coze、TTS、剪映 runner、credits、前端构建源确认后再启用。
# upstream workflow_up { server 127.0.0.1:3103; }
# upstream workflow_api { server 127.0.0.1:8791; }  # Workflow Flask 后端
upstream hot_up      { server 127.0.0.1:3104; }
upstream relay_up    { server 127.0.0.1:3105; }   # API 中转前端（Next basePath=/api-relay）
upstream relay_api   { server 127.0.0.1:5050; }   # API 中转后端（计费网关 + 业务接口）

server {
  listen 443 ssl http2;
  server_name shanhaiyouling.com;

  ssl_certificate     /etc/ssl/shanhaiyouling.com/fullchain.pem;
  ssl_certificate_key /etc/ssl/shanhaiyouling.com/privkey.pem;

  # 流式友好（SSE / chat）：全局关缓冲 + HTTP/1.1
  proxy_http_version 1.1;
  proxy_set_header Connection "";
  proxy_buffering off;
  proxy_read_timeout 300s;
  client_max_body_size 20m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # —— 中央认证：只暴露接口 /auth/api/。——
  # 登录/注册页面已收回到 api-relay 前端（/api-relay/login、/api-relay/register），
  # 不再需要把 /auth/ 整段交给门户，避免占用主域路径。
  location /auth/api/ { proxy_pass http://auth_up; }

  # —— 用户 API Key 流量：OpenAI 兼容计费网关（= api-relay 后端，按余额计费）——
  location /v1/   { proxy_pass http://relay_api; }

  # —— 各产品 API：必须放在对应前端子路径之前，避免 API 被 Next 兜底页吃掉 ——
  location /chat/api/ { proxy_pass http://chat_api/api/; }
  # /workflow 本次暂不上线；完成 F:\game_code\deploy\workflow-production-blockers.md 后再取消注释。
  # location /workflow/api/ { proxy_pass http://workflow_api; }

  # —— 各产品前台（子路径）——
  location /chat/     { proxy_pass http://chat_up; }
  location /tools/    { proxy_pass http://tools_up; }
  # location /workflow/ { proxy_pass http://workflow_up; }
  location /hot/      { proxy_pass http://hot_up; }
  # API 中转后端（业务接口 + 支付回调）；去掉 /api-relay 前缀 → 后端见 /api/...
  # 注意：此 location 必须在 /api-relay/ 之前（更长前缀优先，nginx 自动按最长匹配）
  location /api-relay/api/ { proxy_pass http://relay_api/api/; }
  # ★保留 /api-relay 前缀转发（不要剥前缀）。前端用 Next basePath=/api-relay 构建，
  #  资源在 /api-relay/_next/...；剥前缀会让资源/路由落到主域根(官网)而 404。
  location = /api-relay { return 301 /api-relay/; }
  location /api-relay/ { proxy_pass http://relay_up; }

  # —— 各产品后台（统一 /admin/<product> 子路径）——
  # 各产品后台前端用 basePath: /admin/<product>
  location /admin/chat/     { proxy_pass http://chat_up; }
  location /admin/tools/    { proxy_pass http://tools_up; }
  # location /admin/workflow/ { proxy_pass http://workflow_up; }
  location /admin/hot/      { proxy_pass http://hot_up; }
  location /admin/api-relay/ { proxy_pass http://relay_up; }

  # —— 主域根路径 / 属于现有游戏官网（root=/opt/shanhai/website/frontend/current）——
  # ⚠️ 严禁在此放 location / { proxy_pass portal_up; }，会盖掉官网。
  #    /、/server-health、/install*、/tool-api-test、/license-* 等均由运维主配置维护，本片段不碰。
}

# http → https
server {
  listen 80;
  server_name shanhaiyouling.com;
  return 301 https://$host$request_uri;
}
